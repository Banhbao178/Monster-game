<!DOCTYPE html>
<html>
<head>
  <title>🔥 Monster Battle Classroom 🔥</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🔥 MONSTER BATTLE CLASSROOM 🔥</h1>

<h2>Score: <span id="score">0</span></h2>
<h2>Time Left: <span id="time">30</span></h2>

<h3>Player HP</h3>
<div class="hp-bar">
  <div id="playerHP" class="player"></div>
</div>

<h3>Monster HP</h3>
<div class="hp-bar">
  <div id="monsterHP" class="monster"></div>
</div>

<hr>

<div id="question">Question here</div>
<div id="answers"></div>

<br>
<button onclick="restartGame()">Restart Game</button>

<!-- LEADERBOARD -->
<div id="leaderboardScreen" style="display:none;">
  <h2>🏆 Leaderboard</h2>
  <ul id="leaderboardList"></ul>
  <button onclick="resetLeaderboard()">Reset Leaderboard</button>
  <br><br>
  <button onclick="location.reload()">Play Again</button>
</div>

<script src="questions.js"></script>
<script src="game.js"></script>

</body>
</html>
